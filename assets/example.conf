# hypridle.conf — state machine config
# Docs: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    # ── Commands ─────────────────────────────────────────────────────────────
    # On niri/sway: chain loginctl unlock-session so hypridle knows when lock ends.
    # On Hyprland: harmless duplicate (onUnlocked has idempotency guard).
    lock_cmd             = pidof hyprlock || (hyprlock; loginctl unlock-session)
    unlock_cmd           =
    before_sleep_cmd     = loginctl lock-session
    # Hyprland:  hyprctl dispatch dpms on / off
    # niri:      niri msg action power-on-monitors / power-off-monitors
    after_sleep_cmd      = niri msg action power-on-monitors
    on_lock_cmd          = niri msg action power-on-monitors
    on_unlock_cmd        =
    dpms_off_cmd         = niri msg action power-off-monitors
    dpms_on_cmd          = niri msg action power-on-monitors

    # ── Sleep inhibition ──────────────────────────────────────────────────────
    # 0=off  1=always  2=auto (wait for hyprlock to actually lock)  3=lock-notify only
    inhibit_sleep        = 2
    ignore_dbus_inhibit      = 0
    ignore_systemd_inhibit   = 0
    ignore_wayland_inhibit   = 0


    # ── Group A: Lid events ───────────────────────────────────────────────────
    #
    # Lid close (AC):     lock_suspend  →  lock immediately then suspend
    # Lid close (AC, external monitor): set lock_only to keep running on ext display
    # Lid close (battery):              lock_suspend
    # Lid close (media playing):        lock_only — keep audio alive, no suspend
    # Lid open:           wake + reset idle timer → Group C takes over
    # Lid bouncing:       events within debounce_timeout are ignored
    #
    lid_close_action         = lock_suspend   # AC: lock_suspend | lock_only | suspend_only | nothing
    lid_close_battery_action = lock_suspend   # battery: overrides lid_close_action
    lid_close_media_playing  = lock_only      # when audio/video is playing, skip suspend
    lid_open_reset_idle      = true
    debounce_timeout         = 1500           # ms


    # ── Group B: Unlocked idle ────────────────────────────────────────────────
    #
    # The base timeout starts the chain below. All offsets are from the same
    # idle-start point, not chained from each other.
    #
    # Battery + idle:    base → lock | base+30s → screen off | base+60s → suspend
    # AC + idle:         base → lock | base+30s → screen off  (no suspend on AC)
    # Any + playing:     30min (battery) / base×2 (AC) → screen off only, no lock/suspend
    #
    # Edge case — unplug AC mid-idle: if already-idle time > battery base,
    # the new listeners fire immediately (Wayland idle protocol handles this).
    #
    unlocked_idle_battery    = 180    # 3 min  — screen dims at 2.5 min (listener below)
    unlocked_idle_ac         = 900    # 15 min — screen dims at 2.5 min (listener below)


    # ── Group C: Locked idle ("numb state") ───────────────────────────────────
    #
    # Once locked, short timers take over. Completely independent from Group B.
    # on_lock_cmd turns the screen ON so Group C timer starts from a clean state.
    #
    # Lid open  + battery:  screen off after locked_idle_battery,
    #                        suspend after locked_idle_battery + locked_suspend_battery
    # Lid open  + AC:        screen off after locked_idle_ac (no suspend)
    # Input hit + battery:  screen off after locked_input_battery,
    #                        suspend after locked_input_battery + locked_suspend_battery
    # Input hit + AC:        screen off after locked_input_ac (no suspend)
    #
    # Edge case — accidental touchpad tap at second 50 while waiting to re-suspend:
    # Wayland idle resets automatically → locked_suspend_battery countdown restarts.
    #
    locked_idle_battery      = 15    # s — screen off after lid-open wake (battery)
    locked_suspend_battery   = 60    # s — added on top of screen-off timeout before suspend
    locked_idle_ac           = 30    # s — screen off after lid-open wake (AC)
    locked_input_battery     = 10    # s — screen off after accidental input (battery)
    locked_input_ac          = 30    # s — screen off after accidental input (AC)


    # ── Group D: Suspend → hibernate ─────────────────────────────────────────
    #
    # Checked every 5 s while suspended. AC skips hibernate entirely.
    #
    # D1: battery drops below hibernate_battery_pct while suspended  → hibernate
    # D2: suspended longer than suspend_to_hibernate_timeout          → hibernate
    # D3: AC plugged in while suspended                               → stay suspended
    #
    hibernate_battery_pct        = 5       # %
    suspend_to_hibernate_timeout = 14400   # s  (4 hours)
}


# ── Static listeners ──────────────────────────────────────────────────────────
#
# These run in parallel with the state machine.
# Only use static listeners for things the state machine does NOT handle:
#   ✓ Screen dimming
#   ✓ Keyboard backlight
#   ✗ Lock / screen-off / suspend  ← handled by state machine; remove to avoid duplicates
#
# Keep dim timeout below unlocked_idle_battery and unlocked_idle_ac so dimming
# happens before the lock fires.

listener {
    timeout    = 150                              # 2.5 min (before 3-min battery lock)
    on-timeout = brightnessctl -s set 10          # dim to 10% (avoid 0 on OLED)
    on-resume  = brightnessctl -r                 # restore saved brightness
}

listener {
    timeout    = 150
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume  = brightnessctl -rd rgb:kbd_backlight
}
